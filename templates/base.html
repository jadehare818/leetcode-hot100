<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{% block title %}LeetCode Hot 100{% endblock %}</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<nav class="topnav">
  <div class="brand">🔥 Hot 100</div>
  <a href="{{ url_for('dashboard') }}">今日看板</a>
  <a href="{{ url_for('problems_page') }}">全部题目</a>
  <a href="{{ url_for('cheatsheet_page') }}">Cheatsheet</a>
  <span class="spacer"></span>
  <label class="lang-picker" title="切换编程语言（不删除已有文件）">
    语言
    <select id="lang-select">
      <option value="python">Python</option>
      <option value="go">Go</option>
      <option value="cpp">C++</option>
      <option value="java">Java</option>
    </select>
  </label>
  <span class="today-tag">{{ (self._TemplateReference__context.get('d') or {}).get('date') or '' }}</span>
</nav>
<main>
{% block content %}{% endblock %}
</main>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="{{ url_for('static', filename='cheatsheet_inline.js') }}"></script>
<script src="{{ url_for('static', filename='note_inline.js') }}"></script>
<script src="{{ url_for('static', filename='app.js') }}"></script>
{% block extra_scripts %}{% endblock %}
</body>
</html>
